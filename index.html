<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Generator Pro</title>

<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
padding:20px;
margin:0;
}

.box{
background:rgba(255,255,255,0.1);
padding:20px;
max-width:500px;
margin:auto;
border-radius:15px;
}

input,textarea,select{
width:90%;
padding:10px;
margin:6px;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

.cv{
background:white;
color:black;
padding:20px;
margin-top:20px;
border-radius:10px;
text-align:left;
}

.badge{
display:inline-block;
background:#eee;
padding:5px 10px;
margin:3px;
border-radius:20px;
}

@media(max-width:600px){
.box{
width:95%;
}
}
</style>
</head>

<body>

<select id="lang" onchange="changeLanguage()">
<option value="uz">O'zbek</option>
<option value="en">English</option>
<option value="ru">Русский</option>
</select>

<h1 id="title">🧠 CV Generator Pro</h1>

<div class="box">

<input id="name" placeholder="Ism">

<input id="email" placeholder="Email">

<textarea id="skills" placeholder="Ko'nikmalar"></textarea>

<button id="createBtn" onclick="generate()">
CV yaratish
</button>

<button id="downloadBtn" onclick="downloadCV()">
CV yuklab olish
</button>

<div id="result"></div>

</div>

<script>

function changeLanguage(){

let lang=document.getElementById("lang").value;

if(lang==="uz"){
document.getElementById("title").innerText="🧠 CV Generator Pro";
document.getElementById("name").placeholder="Ism";
document.getElementById("skills").placeholder="Ko'nikmalar";
document.getElementById("createBtn").innerText="CV yaratish";
document.getElementById("downloadBtn").innerText="CV yuklab olish";
}

if(lang==="en"){
document.getElementById("title").innerText="🧠 CV Generator Pro";
document.getElementById("name").placeholder="Name";
document.getElementById("skills").placeholder="Skills";
document.getElementById("createBtn").innerText="Create CV";
document.getElementById("downloadBtn").innerText="Download CV";
}

if(lang==="ru"){
document.getElementById("title").innerText="🧠 Генератор CV";
document.getElementById("name").placeholder="Имя";
document.getElementById("skills").placeholder="Навыки";
document.getElementById("createBtn").innerText="Создать CV";
document.getElementById("downloadBtn").innerText="Скачать CV";
}

}

function generate(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let skills=document.getElementById("skills").value;

let skillList=skills.split(",");

let skillHTML="";

for(let i=0;i<skillList.length;i++){
skillHTML += "<span class='badge'>"+skillList[i].trim()+"</span>";
}

document.getElementById("result").innerHTML=
"<div class='cv'>"+
"<h2>"+name+"</h2>"+
"<p><b>Email:</b> "+email+"</p>"+
"<hr>"+
"<p><b>Skills:</b></p>"+
skillHTML+
"</div>";

}

function downloadCV(){

let content=document.getElementById("result").innerText;

let blob=new Blob([content],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="my-cv.txt";

link.click();

}

</script>

</body>
</html>
